# FFACore Messages (MiniMessage format)
# Placeholders: {player}, {killer}, {victim}, {coins}, {amount}, {item}, {price}, {duration}

prefix: "<gradient:#00ff88:#00cc66><bold>Т“Т“бҙҖ</bold></gradient> <dark_gray>| </dark_gray>"

# Kill messages (random pick)
kill-messages:
  - "{prefix}<white>{killer}</white> <gray>has eliminated</gray> <white>{victim}</white>"
  - "{prefix}<white>{killer}</white> <gray>destroyed</gray> <white>{victim}</white>"
  - "{prefix}<white>{victim}</white> <gray>was slain by</gray> <white>{killer}</white>"
  - "{prefix}<white>{killer}</white> <gray>sent</gray> <white>{victim}</white> <gray>back to spawn</gray>"

# Coin messages
coin-earn: "{prefix}<green>+{amount} бҙ„бҙҸЙӘЙҙs</green> <dark_gray>({coins} total)</dark_gray>"
coin-balance: "{prefix}<gray>КҷбҙҖКҹбҙҖЙҙбҙ„бҙҮ:</gray> <green><bold>{coins}</bold></green> <gray>бҙ„бҙҸЙӘЙҙs</gray>"
coin-set: "{prefix}<gray>Set</gray> <white>{player}</white> <gray>coins to</gray> <green>{coins}</green>"
coin-not-enough: "{prefix}<red>ЙҙбҙҸбҙӣ бҙҮЙҙбҙҸбҙңЙўКң бҙ„бҙҸЙӘЙҙs!</red> <dark_gray>(need {price})</dark_gray>"

# Kit messages
kit-saved: "{prefix}<green>бҙӢЙӘбҙӣ sбҙҖбҙ бҙҮбҙ…!</green> <dark_gray>({amount} items)</dark_gray>"
kit-given: "{prefix}<gray>бҙӢЙӘбҙӣ бҙҮЗ«бҙңЙӘбҙҳбҙҳбҙҮбҙ…</gray>"
kit-empty: "{prefix}<red>No kit saved yet! Use /savekit first.</red>"

# Shop messages
shop-title: "<gradient:#00ff88:#00cc66><bold>Т“Т“бҙҖ sКңбҙҸбҙҳ</bold></gradient>"
shop-purchased: "{prefix}<green>бҙҳбҙңКҖбҙ„КңбҙҖsбҙҮбҙ…</green> <white>{item}</white> <dark_gray>(-{price} бҙ„бҙҸЙӘЙҙs)</dark_gray>"
shop-active: "{prefix}<yellow>{item}</yellow> <gray>is already active!</gray>"

# Death/respawn
death-title: "<red><bold>бҙ…бҙҮбҙҖбҙ…</bold></red>"
death-subtitle: "<gray>killed by</gray> <white>{killer}</white>"
respawn-title: "<gradient:#00ff88:#00cc66><bold>КҖбҙҮsбҙҳбҙҖбҙЎЙҙбҙҮбҙ…</bold></gradient>"
respawn-subtitle: "<gray>ЙўбҙҸбҙҸбҙ… Кҹбҙңбҙ„бҙӢ</gray>"

# General
no-permission: "{prefix}<red>ЙҙбҙҸ бҙҳбҙҮКҖбҙҚЙӘssЙӘбҙҸЙҙ</red>"
player-only: "{prefix}<red>Only players can use this.</red>"
player-not-found: "{prefix}<red>Player not found.</red>"
usage-setcoins: "{prefix}<gray>Usage: /setcoins <player> <amount></gray>"

# Combat tag
combat-tag: "<gradient:#ff4444:#ff8888><bold>ЙӘЙҙ бҙ„бҙҸбҙҚКҷбҙҖбҙӣ</bold></gradient> <white>{time}s</white>"
combat-end: "<green><bold>бҙ„бҙҸбҙҚКҷбҙҖбҙӣ бҙҮЙҙбҙ…бҙҮбҙ…</bold></green>"

# Spawn
spawn-set: "{prefix}<green>sбҙҳбҙҖбҙЎЙҙ sбҙҮбҙӣ!</green> <dark_gray>(at your location)</dark_gray>"
spawn-teleported: "{prefix}<green>бҙӣбҙҮКҹбҙҮбҙҳбҙҸКҖбҙӣбҙҮбҙ… бҙӣбҙҸ sбҙҳбҙҖбҙЎЙҙ</green>"
spawn-combat: "{prefix}<red>бҙ…бҙң КҷЙӘsбҙӣ ЙӘбҙҚ бҙ„бҙҸбҙҚКҷбҙҖбҙӣ!</red> <dark_gray>(wait for timer)</dark_gray>"
spawn-not-set: "{prefix}<red>No spawn set yet.</red>"
spawn-warmup: "{prefix}<gray>бҙӣбҙҮКҹбҙҮбҙҳбҙҸКҖбҙӣ ЙӘЙҙ</gray> <white>{time}s</white> <dark_gray>(don't move)</dark_gray>"
spawn-countdown: "<gradient:#00ff88:#00cc66><bold>sбҙҳбҙҖбҙЎЙҙ</bold></gradient> <white>{time}s</white>"
spawn-cancelled: "{prefix}<red>бҙӣбҙҮКҹбҙҮбҙҳбҙҸКҖбҙӣ бҙҖКҷЙўбҙҮКҷКҖбҙҸбҙ„КңбҙҮЙҙ!</red> <dark_gray>(moved)</dark_gray>"
spawn-already-warming: "{prefix}<red>Already teleporting...</red>"
