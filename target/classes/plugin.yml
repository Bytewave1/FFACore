name: FFACore
version: 1.0.0
main: dev.warpsmp.ffacore.FFACore
api-version: '1.21'
folia-supported: true
description: FFA Core Plugin for WarpSMP
authors: [Bytewave1]
softdepend: [PlaceholderAPI]

commands:
  adminsavekit:
    description: Save the default FFA kit (admin)
    permission: ffacore.admin
  savekit:
    description: Save your personal kit layout
  kit:
    description: Get your FFA kit
  shop:
    description: Open the FFA shop
  coins:
    description: Check your coins
  setcoins:
    description: Set a player's coins
    permission: ffacore.admin
  adminsetspawn:
    description: Set the FFA spawn point
    permission: ffacore.admin
  spawn:
    description: Teleport to spawn
  arenareset:
    description: Arena reset management
    permission: ffacore.admin
  event:
    description: Start/stop events
    permission: ffacore.admin
  stats:
    description: View player stats
  top:
    description: View leaderboard
  discord:
    description: Show Discord invite link
  killreset:
    description: Reset kills for a player or all
    permission: ffacore.admin
  deathreset:
    description: Reset deaths for a player or all
    permission: ffacore.admin

permissions:
  ffacore.admin:
    description: FFA Core admin permissions
    default: op
  ffacore.kit.bypass:
    description: Bypass kit cooldown and combat check
    default: op
  ffacore.arena.bypass:
    description: Bypass arena block protection (can break original blocks)
    default: op
