# FFACore Configuration

# Coins awarded per kill
coins-per-kill: 10

# Auto-equip kit on join
kit-on-join: true

# Auto-equip kit on death (respawn)
kit-on-respawn: true

# Clear inventory before giving kit
clear-before-kit: true

# Respawn delay in ticks (20 = 1 second)
respawn-delay: 1

# Spawn warmup in seconds (0 = instant)
spawn-warmup: 3

# Kit cooldown in seconds (600 = 10 minutes)
kit-cooldown: 600

# Discord invite link
discord-link: "https://discord.gg/7xrrbvH4nA"

# Arena reset interval in seconds (300 = 5 minutes)
# All player-placed blocks inside arenas get cleared every X seconds
arena-reset-interval: 300
