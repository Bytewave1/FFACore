# FFACore Configuration

# Coins awarded per kill
coins-per-kill: 10

# Auto-equip kit on join
kit-on-join: true

# Auto-equip kit on death (respawn)
kit-on-respawn: true

# Clear inventory before giving kit
clear-before-kit: true

# Respawn delay in ticks (20 = 1 second)
respawn-delay: 1

# Spawn warmup in seconds (0 = instant)
spawn-warmup: 3

# Time in seconds before placed blocks get removed (0 = disabled)
block-remove-delay: 60
